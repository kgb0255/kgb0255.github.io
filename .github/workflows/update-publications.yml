name: Update Publications

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications from ADS
        env:
          APS_PUBLICATION_LIBRARY_TOKEN: ${{ secrets.APS_PUBLICATION_LIBRARY_TOKEN }}
        run: python scripts/fetch_publications.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research.html
          git diff --staged --quiet || git commit -m "Update publications from ADS library"
          git push
